<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator Web Application</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
}

.calculator{
    width:350px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.title{
    text-align:center;
    color:white;
    margin-bottom:15px;
    font-size:24px;
    font-weight:bold;
}

.display{
    width:100%;
    height:80px;
    border:none;
    outline:none;
    border-radius:10px;
    text-align:right;
    padding:15px;
    font-size:32px;
    margin-bottom:15px;
    background:white;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:60px;
    border:none;
    border-radius:10px;
    font-size:22px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.number{
    background:#f1f5f9;
}

.operator{
    background:#3b82f6;
    color:white;
}

.equal{
    background:#22c55e;
    color:white;
}

.clear{
    background:#ef4444;
    color:white;
}

@media(max-width:400px){
    .calculator{
        width:95%;
    }
}
</style>
</head>

<body>

<div class="calculator">

    <div class="title">Calculator</div>

    <input type="text" class="display" id="display" readonly>

    <div class="buttons">

        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="appendValue('/')">÷</button>
        <button class="operator" onclick="appendValue('*')">×</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button class="number" onclick="appendValue('7')">7</button>
        <button class="number" onclick="appendValue('8')">8</button>
        <button class="number" onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button class="number" onclick="appendValue('4')">4</button>
        <button class="number" onclick="appendValue('5')">5</button>
        <button class="number" onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('%')">%</button>

        <button class="number" onclick="appendValue('1')">1</button>
        <button class="number" onclick="appendValue('2')">2</button>
        <button class="number" onclick="appendValue('3')">3</button>
        <button class="equal" onclick="calculate()">=</button>

        <button class="number" onclick="appendValue('0')">0</button>
        <button class="number" onclick="appendValue('.')">.</button>
        <button class="number" onclick="deleteLast()">⌫</button>
        <button class="operator" onclick="appendValue('(')">(</button>

    </div>

</div>

<script>

const display = document.getElementById("display");

function appendValue(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function deleteLast(){
    display.value = display.value.slice(0,-1);
}

function calculate(){

    try{
        let result = eval(display.value);

        if(result === undefined){
            display.value = "";
        }else{
            display.value = result;
        }

    }catch{
        display.value = "Error";
    }
}

document.addEventListener("keydown", function(event){

    const key = event.key;

    if(
        (key >= '0' && key <= '9') ||
        ['+','-','*','/','.','%','(',')'].includes(key)
    ){
        display.value += key;
    }

    if(key === 'Enter'){
        calculate();
    }

    if(key === 'Backspace'){
        deleteLast();
    }

    if(key === 'Escape'){
        clearDisplay();
    }

});

</script>

</body>
</html>
